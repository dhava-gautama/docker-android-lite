# docker-android-lite — Docker Compose Examples
# Usage: docker compose up <service-name>

services:

  # ============================================================
  # 1. HEADLESS CI/CD — automated testing
  # adb connect localhost:5555
  # ============================================================
  ci:
    image: ghcr.io/dhava-gautama/docker-android-lite:api-34
    privileged: true
    ports:
      - "5554:5554"
      - "127.0.0.1:5555:5555"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MEMORY=4096
      - CORES=2
      - HEADLESS=true
    volumes:
      - ci-data:/data
    restart: unless-stopped

  # ============================================================
  # 2. APP TESTING — with scrcpy screen
  # scrcpy -s localhost:5555
  # ============================================================
  app-test:
    image: ghcr.io/dhava-gautama/docker-android-lite:api-34-playstore
    privileged: true
    ports:
      - "5554:5554"
      - "127.0.0.1:5555:5555"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MEMORY=4096
      - CORES=2
      - DEVICE_ID=pixel_8
      - HEADLESS=false
    volumes:
      - app-test-data:/data
    restart: unless-stopped

  # ============================================================
  # 3. SECURITY TESTING — root + anti-emu + SSL interception
  # mitmweb: http://localhost:8081 (password: mitmweb)
  # frida:   frida-ps -H localhost:5555
  # ============================================================
  pentest:
    image: ghcr.io/dhava-gautama/docker-android-lite:api-34-playstore
    privileged: true
    ports:
      - "5554:5554"
      - "127.0.0.1:5555:5555"
      - "8081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MEMORY=4096
      - CORES=2
      - ROOTED=true
      - STRONGERANTIEMU=true
      - SSLBYPASS=true
      - HEADLESS=false
    volumes:
      - pentest-data:/data
    restart: unless-stopped

  # ============================================================
  # 4. GPU ACCELERATED — NVIDIA CUDA rendering
  # Requires: nvidia-container-toolkit
  # ============================================================
  gpu:
    image: ghcr.io/dhava-gautama/docker-android-lite:api-34-cuda
    privileged: true
    ports:
      - "5554:5554"
      - "127.0.0.1:5555:5555"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MEMORY=8192
      - CORES=4
      - GPU_ACCELERATED=true
      - HEADLESS=false
    volumes:
      - gpu-data:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # ============================================================
  # 5. MULTI-DEVICE FARM — 3 emulators, different API levels
  # adb connect localhost:5561 / 5563 / 5565
  # ============================================================
  farm-api30:
    image: ghcr.io/dhava-gautama/docker-android-lite:api-30
    privileged: true
    ports:
      - "5560:5554"
      - "127.0.0.1:5561:5555"
    environment:
      - MEMORY=2048
      - CORES=1
      - HEADLESS=true
    volumes:
      - farm-30:/data
    restart: unless-stopped

  farm-api33:
    image: ghcr.io/dhava-gautama/docker-android-lite:api-33
    privileged: true
    ports:
      - "5562:5554"
      - "127.0.0.1:5563:5555"
    environment:
      - MEMORY=2048
      - CORES=1
      - HEADLESS=true
    volumes:
      - farm-33:/data
    restart: unless-stopped

  farm-api34:
    image: ghcr.io/dhava-gautama/docker-android-lite:api-34
    privileged: true
    ports:
      - "5564:5554"
      - "127.0.0.1:5565:5555"
    environment:
      - MEMORY=2048
      - CORES=1
      - HEADLESS=true
    volumes:
      - farm-34:/data
    restart: unless-stopped

  # ============================================================
  # 6. BUG BOUNTY — full stealth + Play Store + GPU + SSL + Frida
  # mitmweb: http://localhost:8081 (password: mitmweb)
  # scrcpy:  scrcpy -s localhost:5555
  # frida:   frida-ps -H localhost:5555
  # ============================================================
  bounty:
    image: ghcr.io/dhava-gautama/docker-android-lite:api-34-playstore-cuda
    privileged: true
    ports:
      - "5554:5554"
      - "127.0.0.1:5555:5555"
      - "8081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - MEMORY=8192
      - CORES=4
      - DEVICE_ID=pixel_8
      - GPU_ACCELERATED=true
      - ROOTED=true
      - STRONGERANTIEMU=true
      - SSLBYPASS=true
      - HEADLESS=false
    volumes:
      - bounty-data:/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # ============================================================
  # 7. MINIMAL — no SDK, mount externally
  # ============================================================
  minimal:
    image: ghcr.io/dhava-gautama/docker-android-lite:api-34-minimal
    privileged: true
    ports:
      - "5554:5554"
      - "127.0.0.1:5555:5555"
    environment:
      - MEMORY=4096
      - CORES=2
    volumes:
      - /path/to/android-sdk:/opt/android:ro
      - minimal-data:/data

volumes:
  ci-data:
  app-test-data:
  pentest-data:
  gpu-data:
  farm-30:
  farm-33:
  farm-34:
  bounty-data:
  minimal-data:
