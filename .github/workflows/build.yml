name: Build Docker Android Lite

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 04:00 UTC

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: dhava-gautama/docker-android-lite

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error
          ignore: DL3008,DL3013,DL3015,DL3059,SC2086
        continue-on-error: true
      - name: Lint Dockerfile.gpu
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.gpu
          failure-threshold: error
          ignore: DL3008,DL3013,DL3015,DL3059,SC2086
        continue-on-error: true
      - name: Validate scripts
        run: |
          for f in scripts/*.sh; do
            bash -n "$f" && echo "$f: OK" || exit 1
          done

  build:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # ---- google_apis (adb root works) ----
          - api_level: "30"
            img_type: "google_apis"
            dockerfile: "Dockerfile"
            tag_suffix: ""
          - api_level: "33"
            img_type: "google_apis"
            dockerfile: "Dockerfile"
            tag_suffix: ""
          - api_level: "34"
            img_type: "google_apis"
            dockerfile: "Dockerfile"
            tag_suffix: ""
          - api_level: "35"
            img_type: "google_apis"
            dockerfile: "Dockerfile"
            tag_suffix: ""

          # ---- google_apis + Aurora Store (adb root works) ----
          - api_level: "34"
            img_type: "google_apis"
            dockerfile: "Dockerfile"
            tag_suffix: "-playstore"

          # ---- google_apis_playstore (native Play Store, no adb root) ----
          - api_level: "33"
            img_type: "google_apis_playstore"
            dockerfile: "Dockerfile"
            tag_suffix: "-gplaystore"
          - api_level: "34"
            img_type: "google_apis_playstore"
            dockerfile: "Dockerfile"
            tag_suffix: "-gplaystore"
          - api_level: "35"
            img_type: "google_apis_playstore"
            dockerfile: "Dockerfile"
            tag_suffix: "-gplaystore"

          # ---- CUDA GPU variants ----
          - api_level: "34"
            img_type: "google_apis"
            dockerfile: "Dockerfile.gpu"
            tag_suffix: "-cuda"
          - api_level: "34"
            img_type: "google_apis"
            dockerfile: "Dockerfile.gpu"
            tag_suffix: "-playstore-cuda"
          - api_level: "34"
            img_type: "google_apis_playstore"
            dockerfile: "Dockerfile.gpu"
            tag_suffix: "-gplaystore-cuda"

          # ---- Minimal (no SDK) ----
          - api_level: "34"
            img_type: "google_apis"
            dockerfile: "Dockerfile"
            tag_suffix: "-minimal"
            install_sdk: "0"
      fail-fast: false

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get -qq autoremove --purge > /dev/null 2>&1 || true

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            API_LEVEL=${{ matrix.api_level }}
            IMG_TYPE=${{ matrix.img_type }}
            INSTALL_ANDROID_SDK=${{ matrix.install_sdk || '1' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:api-${{ matrix.api_level }}${{ matrix.tag_suffix }}
          labels: |
            org.opencontainers.image.source=https://github.com/dhava-gautama/docker-android-lite
            org.opencontainers.image.description=Lightweight Android emulator (API ${{ matrix.api_level }}${{ matrix.tag_suffix }})
